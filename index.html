<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DECIDE — 고민은 그만. 결정은 AI에게.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --primary: #FF2D55;
      --primary-hover: #e6263b;
      --purple: #BF5AF2;
      --text: #ffffff;
      --muted: #8e8e93;
      --border: #2c2c2e;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .screen { display: none; min-height: 100vh; }
    .screen.active { display: flex; }

    .center-layout {
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 24px;
    }

    .top-layout {
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 64px 24px;
    }

    .inner { width: 100%; max-width: 576px; }

    .logo-text {
      font-size: clamp(72px, 16vw, 128px);
      font-weight: 900;
      letter-spacing: 6px;
      line-height: 1;
      color: var(--text);
      font-style: italic;
    }

    .tagline {
      color: var(--muted);
      font-size: 13px;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 10px;
    }

    .decision-textarea {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      color: var(--text);
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 18px;
      line-height: 1.65;
      padding: 22px 24px;
      resize: none;
      outline: none;
      min-height: 140px;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .decision-textarea::placeholder { color: var(--muted); opacity: 0.7; }
    .decision-textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(255, 45, 85, 0.12);
    }

    .decide-btn {
      width: 100%;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 14px;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 22px;
      font-weight: 900;
      padding: 20px;
      cursor: pointer;
      transition: transform 0.1s ease, background 0.15s ease, box-shadow 0.2s ease;
      letter-spacing: 2px;
    }
    .decide-btn:hover:not(:disabled) {
      background: var(--primary-hover);
      box-shadow: 0 8px 40px rgba(255, 45, 85, 0.45);
      transform: translateY(-2px);
    }
    .decide-btn:active:not(:disabled) { transform: translateY(1px); box-shadow: none; }
    .decide-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .example-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .example-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--muted);
      padding: 10px 14px;
      font-size: 13px;
      font-family: 'Noto Sans KR', sans-serif;
      text-align: left;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      line-height: 1.4;
    }
    .example-chip:hover { color: var(--text); border-color: #555; }

    .spinner {
      width: 64px;
      height: 64px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--primary);
      display: block;
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1); }
    }

    .result-badge {
      color: var(--primary);
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 28px;
      animation: fadeUp 0.4s ease 0.1s both;
    }
    .verdict-emoji {
      font-size: 88px;
      text-align: center;
      margin-bottom: 16px;
      display: block;
      animation: dropIn 0.65s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.3s both;
    }
    .verdict-text {
      font-size: clamp(30px, 6.5vw, 52px);
      font-weight: 900;
      text-align: center;
      line-height: 1.2;
      min-height: 60px;
      margin-bottom: 4px;
      word-break: keep-all;
    }
    .divider {
      width: 48px;
      height: 3px;
      background: var(--primary);
      margin: 28px auto;
      border-radius: 2px;
      animation: fadeUp 0.4s ease both;
    }
    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px 24px;
      margin-bottom: 12px;
    }
    .psych-card {
      background: linear-gradient(135deg, #150a28 0%, #0a1528 100%);
      border-color: rgba(191, 90, 242, 0.25);
    }
    .card-label {
      font-size: 10px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .card-text { font-size: 16px; line-height: 1.75; color: var(--text); }
    .psych-concept { font-size: 22px; font-weight: 700; color: var(--purple); margin-bottom: 6px; }
    .psych-explain { font-size: 14px; color: #aaa; line-height: 1.5; }

    .retry-btn {
      width: 100%;
      margin-top: 8px;
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 14px;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 16px;
      font-weight: 700;
      padding: 16px;
      cursor: pointer;
      transition: color 0.2s ease, border-color 0.2s ease;
    }
    .retry-btn:hover { color: var(--text); border-color: #555; }

    @keyframes dropIn {
      from { opacity: 0; transform: translateY(-50px) scale(0.6); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .slide-up { animation: fadeUp 0.45s ease both; }
    .fade-in { animation: fadeUp 0.4s ease both; }
  </style>
</head>
<body>

  <!-- ── INPUT SCREEN ── -->
  <main id="screen-input" class="screen active center-layout">
    <div class="inner">
      <div style="text-align:center;margin-bottom:48px">
        <h1 class="logo-text">DE<span style="color:var(--primary)">CIDE</span></h1>
        <p class="tagline">고민은 그만. 결정은 AI에게.</p>
      </div>

      <textarea
        id="dilemma-input"
        class="decision-textarea"
        maxlength="300"
        placeholder="지금 고민이 뭐야? 짧게 써봐.&#10;예) 오늘 술자리 갈지 말지, 퇴직할지 말지..."
      ></textarea>

      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px;margin-bottom:16px;color:var(--muted);font-size:12px">
        <span>Ctrl+Enter로도 제출</span>
        <span id="char-count">0/300</span>
      </div>

      <button id="submit-btn" class="decide-btn" disabled onclick="handleSubmit()">결정해줘! →</button>

      <div style="margin-top:40px">
        <p style="color:var(--muted);font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;text-align:center">예시 고민</p>
        <div class="example-grid">
          <button class="example-chip" onclick="fillExample(this)">오늘 술자리 갈까 말까</button>
          <button class="example-chip" onclick="fillExample(this)">지금 이 회사 퇴직할지 말지</button>
          <button class="example-chip" onclick="fillExample(this)">남자친구한테 먼저 연락할지 말지</button>
          <button class="example-chip" onclick="fillExample(this)">유학 갈지 국내에 남을지</button>
        </div>
      </div>
    </div>
  </main>

  <!-- ── LOADING SCREEN ── -->
  <main id="screen-loading" class="screen center-layout" style="flex-direction:column;gap:32px">
    <div class="spinner"></div>
    <div style="text-align:center">
      <p style="color:var(--muted);font-size:11px;letter-spacing:4px;text-transform:uppercase;margin-bottom:14px">심리학적 분석</p>
      <p id="loading-step" style="color:var(--text);font-size:20px;font-weight:700;min-height:30px;transition:opacity 0.25s ease"></p>
    </div>
    <div style="display:flex;gap:8px">
      <span class="dot" style="animation-delay:0s"></span>
      <span class="dot" style="animation-delay:0.2s"></span>
      <span class="dot" style="animation-delay:0.4s"></span>
    </div>
  </main>

  <!-- ── RESULT SCREEN ── -->
  <main id="screen-result" class="screen top-layout">
    <div class="inner">
      <p class="result-badge">⚡ 결정 완료</p>
      <span id="result-emoji" class="verdict-emoji"></span>
      <div id="result-decision" class="verdict-text"></div>
      <div id="result-divider" class="divider" style="display:none"></div>
      <div id="result-reason" class="result-card slide-up" style="display:none">
        <div class="card-label">왜 이 결정인가</div>
        <div id="reason-text" class="card-text"></div>
      </div>
      <div id="result-psych" class="result-card psych-card slide-up" style="display:none">
        <div class="card-label">적용된 심리학 개념</div>
        <div id="psych-concept" class="psych-concept"></div>
        <div id="psych-explain" class="psych-explain"></div>
      </div>
      <button id="retry-btn" class="retry-btn fade-in" style="display:none" onclick="showScreen('input')">↩ 다시 결정하기</button>
    </div>
  </main>

  <script>
    /* ─── PSYCHOLOGY ENGINE ─── */
    const CONCEPTS = [
      {
        concept: '후회 최소화 이론',
        explain: '80세의 자신이 후회할 선택을 지금 피하라는 결정 프레임워크',
        emoji_do: '🚀', emoji_dont: '🧘',
        reason_do: '80세의 당신이 오늘을 돌아볼 때, 하지 않은 것에 더 큰 후회를 남긴다. 실패는 잊혀지지만 시도조차 않은 기억은 영원히 남는다. 지금 이 기회를 잡아라.',
        reason_dont: '후회 최소화 이론은 감정적 충동도 경계하라 말한다. 확신 없이 억지로 밀어붙인 결과가 더 큰 후회를 만든다. 지금 멈추는 것이 옳다.',
      },
      {
        concept: '손실 회피 편향',
        explain: '인간은 이득보다 손실에 2배 더 민감하게 반응하는 심리적 경향',
        emoji_do: '💡', emoji_dont: '🛡️',
        reason_do: '손실 회피 편향이 당신을 붙잡고 있다. 잃을 것에 대한 두려움이 실제보다 2배 과장되어 느껴지고 있는 것이다. 냉정하게 계산하면 지금 얻을 것이 훨씬 크다.',
        reason_dont: '현재 상태를 유지하는 것이 최선이다. 지금 느끼는 불안은 무시해선 안 될 진짜 신호다. 리스크를 직시하고 보수적으로 판단해라.',
      },
      {
        concept: '현상 유지 편향',
        explain: '변화보다 현재 상태를 선호하는 인간의 무의식적 경향',
        emoji_do: '⚡', emoji_dont: '⚓',
        reason_do: '현상 유지 편향이 변화를 막고 있다. 망설이는 건 뇌가 만들어낸 착각이다. 실제로는 아무 문제 없이 해낼 수 있다. 지금 움직여라.',
        reason_dont: '변화가 항상 좋은 건 아니다. 지금의 안정이 얼마나 소중한지를 과소평가하고 있다. 현상 유지는 나약함이 아니라 전략이다.',
      },
      {
        concept: '인지 부조화',
        explain: '모순된 믿음이 충돌할 때 발생하는 심리적 불편함과 그 해소 과정',
        emoji_do: '🔥', emoji_dont: '🧊',
        reason_do: '지금 느끼는 갈등은 인지 부조화다. 이미 하고 싶다는 걸 알면서 이유를 찾고 있는 것이다. 솔직해져라. 답은 이미 나와 있다.',
        reason_dont: '인지 부조화는 내면의 경고 신호다. 이성이 불편함을 느끼는 데는 이유가 있다. 그 불편함을 억누르지 말고 들어라.',
      },
      {
        concept: '자기 효능감',
        explain: '스스로 할 수 있다는 믿음이 실제 성과를 결정한다는 반두라의 이론',
        emoji_do: '💪', emoji_dont: '🎯',
        reason_do: '자기 효능감 연구에 따르면, "할 수 있다"는 믿음 자체가 성공 확률을 높인다. 지금 필요한 건 완벽한 준비가 아니라 시작하는 용기다.',
        reason_dont: '자기 효능감은 무모한 도전을 권장하지 않는다. 지금 시점이 최적이 아니라는 판단 자체가 정확한 자기 인식이다. 더 준비해라.',
      },
      {
        concept: 'FOMO (기회 손실 공포)',
        explain: '놓칠까봐 두려워하는 심리가 비합리적 결정을 유발하는 현상',
        emoji_do: '🎪', emoji_dont: '😤',
        reason_do: 'FOMO를 역이용해라. 이 기회를 놓쳤을 때의 아쉬움을 상상해봐라. 그 감각이 지금 해야 한다는 신호다. 망설일 시간이 없다.',
        reason_dont: 'FOMO에 끌려다니지 마라. 모든 기회를 잡으려는 충동이 정작 중요한 것을 놓치게 만든다. 이건 진짜 기회가 아니다.',
      },
      {
        concept: '스포트라이트 효과',
        explain: '타인이 나를 실제보다 훨씬 더 주목하고 있다고 착각하는 인지 편향',
        emoji_do: '🌟', emoji_dont: '🕶️',
        reason_do: '스포트라이트 효과로 인해 남들의 시선을 과대평가하고 있다. 실제로 아무도 그렇게 신경쓰지 않는다. 눈치 볼 필요 없이 결정해라.',
        reason_dont: '지금 신중한 것이 남들 눈에 어떻게 보이든 중요하지 않다. 스포트라이트는 상상 속에만 있다. 조용히 패스하면 된다.',
      },
      {
        concept: '앵커링 효과',
        explain: '처음 접한 정보가 이후 판단에 과도하게 영향을 미치는 인지 편향',
        emoji_do: '🔓', emoji_dont: '🔄',
        reason_do: '과거의 실패나 부정적 경험이 앵커가 되어 판단을 왜곡하고 있다. 그 경험을 버리고 지금 상황을 새로 봐라. 지금은 다르다.',
        reason_dont: '과거의 긍정적 경험이 앵커가 되어 이번에도 잘 될 거라는 착각을 만들고 있다. 조건이 달라졌다는 걸 직시해라.',
      },
      {
        concept: '파레토 법칙',
        explain: '80%의 결과가 20%의 핵심 원인에서 비롯된다는 경영학적 원리',
        emoji_do: '📈', emoji_dont: '✂️',
        reason_do: '지금 이 결정이 당신 삶의 핵심 20%에 해당한다. 파레토 법칙에 따르면 이 선택 하나가 앞으로의 80%를 바꿀 수 있다. 투자할 가치가 있다.',
        reason_dont: '파레토 법칙으로 보면 이건 핵심 20%가 아니다. 에너지를 낭비하지 마라. 더 중요한 것에 집중해야 한다.',
      },
      {
        concept: '결정 피로',
        explain: '반복적인 결정이 판단력을 소모시켜 충동적 선택을 유발하는 현상',
        emoji_do: '⚡', emoji_dont: '🛌',
        reason_do: '결정 피로가 누적되어 판단이 흐려진 상태일수록 단순하게 결론 내려야 한다. 지금 직감이 옳다. 복잡하게 생각하지 마라.',
        reason_dont: '결정 피로 상태에서 내린 결정은 후회로 이어진다. 지금 판단력이 최상이 아니다. 잠시 멈추는 게 현명하다.',
      },
      {
        concept: '매몰 비용 오류',
        explain: '이미 쏟아부은 시간·돈·노력 때문에 계속 집착하게 되는 심리적 함정',
        emoji_do: '🏃', emoji_dont: '🚪',
        reason_do: '지금까지 투자한 것들이 아깝다고 느끼는 건 당연하다. 하지만 그게 계속할 이유가 된다. 이미 쏟아부은 것들이 지금 선택의 무게를 더해주고 있다.',
        reason_dont: '매몰 비용에 발목 잡히지 마라. 이미 쓴 시간과 돈은 돌아오지 않는다. 지금부터라도 새로운 방향으로 가는 것이 합리적이다.',
      },
      {
        concept: '통제 소재 이론',
        explain: '결과가 자신의 행동에서 비롯된다고 믿는 내적 통제력이 성공을 만든다는 이론',
        emoji_do: '🎮', emoji_dont: '🌊',
        reason_do: '내적 통제 소재가 높은 사람은 능동적으로 선택하고 책임진다. 지금 결정하는 것 자체가 당신의 삶을 주도하는 행위다. 망설이지 마라.',
        reason_dont: '지금 상황이 내 통제 밖에 있다는 걸 인정하는 것도 지혜다. 억지로 통제하려 들면 더 큰 혼란이 온다. 흐름에 맡겨라.',
      },
    ]

    const DECISION_PATTERNS = [
      { re: /고백할[까지]\s*말[까지]/, do: '고백해라!', dont: '고백하지 마라!', e_do: '💌', e_dont: '🙈' },
      { re: /헤어질[까지]\s*말[까지]|이별할[까지]\s*말[까지]/, do: '헤어져라!', dont: '버텨라!', e_do: '💔', e_dont: '❤️‍🔥' },
      { re: /연락할[까지]\s*말[까지]/, do: '연락해라!', dont: '연락하지 마라!', e_do: '📱', e_dont: '📵' },
      { re: /퇴직할[까지]\s*말[까지]|그만둘[까지]\s*말[까지]|사직할[까지]\s*말[까지]/, do: '퇴직해라!', dont: '버텨라!', e_do: '🚪', e_dont: '💼' },
      { re: /먹을[까지]\s*말[까지]/, do: '먹어라!', dont: '먹지 마라!', e_do: '🍜', e_dont: '🙅' },
      { re: /살[까지]\s*말[까지]/, do: '사라!', dont: '사지 마라!', e_do: '🛍️', e_dont: '💰' },
      { re: /볼[까지]\s*말[까지]/, do: '봐라!', dont: '보지 마라!', e_do: '🎬', e_dont: '🚫' },
      { re: /갈[까지]\s*말[까지]/, do: '가라!', dont: '가지 마라!', e_do: '🚀', e_dont: '🛌' },
      { re: /할[까지]\s*말[까지]/, do: '해라!', dont: '하지 마라!', e_do: '⚡', e_dont: '🛑' },
      { re: /올[까지]\s*말[까지]/, do: '와라!', dont: '오지 마라!', e_do: '🙌', e_dont: '✋' },
    ]

    function pickDecisionText(dilemma) {
      for (const p of DECISION_PATTERNS) {
        if (p.re.test(dilemma)) return p
      }
      return { do: '그냥 해라!', dont: '하지 마라!', e_do: '⚡', e_dont: '🛑' }
    }

    function analyzeLocal(dilemma) {
      const goYes = Math.random() < 0.5
      const concept = CONCEPTS[Math.floor(Math.random() * CONCEPTS.length)]
      const pattern = pickDecisionText(dilemma)
      return {
        emoji:              goYes ? (pattern.e_do   || concept.emoji_do)   : (pattern.e_dont || concept.emoji_dont),
        decision:           goYes ? pattern.do   : pattern.dont,
        reason:             goYes ? concept.reason_do   : concept.reason_dont,
        psychology_concept: concept.concept,
        psychology_explain: concept.explain,
      }
    }

    /* ─── LOADING STEPS ─── */
    const LOADING_STEPS = [
      '상황 파악 중...',
      '심리학적 패턴 분석 중...',
      '편향 검토 중...',
      '최적 결정 도출 중...',
      '결과 정리 중...',
    ]

    const SCRAMBLE_CHARS = '!<>-_\\/[]{}—=+*^?#@$%'
    let loadingInterval = null

    /* ─── SCREEN ─── */
    function showScreen(name) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'))
      document.getElementById('screen-' + name).classList.add('active')
    }

    /* ─── INPUT ─── */
    const textarea  = document.getElementById('dilemma-input')
    const submitBtn = document.getElementById('submit-btn')
    const charCount = document.getElementById('char-count')

    textarea.addEventListener('input', () => {
      charCount.textContent = textarea.value.length + '/300'
      submitBtn.disabled = textarea.value.trim().length === 0
    })

    textarea.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) handleSubmit()
    })

    function fillExample(btn) {
      textarea.value = btn.textContent
      textarea.dispatchEvent(new Event('input'))
      textarea.focus()
    }

    /* ─── LOADING ANIMATION ─── */
    function startLoading() {
      let idx = 0
      const el = document.getElementById('loading-step')
      el.textContent = LOADING_STEPS[0]
      el.style.opacity = '1'
      loadingInterval = setInterval(() => {
        el.style.opacity = '0'
        setTimeout(() => {
          idx = (idx + 1) % LOADING_STEPS.length
          el.textContent = LOADING_STEPS[idx]
          el.style.opacity = '1'
        }, 250)
      }, 950)
    }

    function stopLoading() {
      clearInterval(loadingInterval)
      loadingInterval = null
    }

    /* ─── TEXT SCRAMBLE ─── */
    function textScramble(container, finalText) {
      return new Promise((resolve) => {
        const queue = finalText.split('').map(ch => ({
          to: ch,
          start: Math.floor(Math.random() * 18),
          end: Math.floor(Math.random() * 18) + Math.floor(Math.random() * 22) + 12,
          char: '',
        }))
        let frame = 0

        function safe(c) {
          return c === '&' ? '&amp;' : c === '<' ? '&lt;' : c === '>' ? '&gt;' : c
        }

        function update() {
          let out = '', done = 0
          for (let i = 0; i < queue.length; i++) {
            const q = queue[i]
            if (frame >= q.end) {
              done++; out += safe(q.to)
            } else if (frame >= q.start) {
              const c = !q.char || Math.random() < 0.28
                ? SCRAMBLE_CHARS[Math.floor(Math.random() * SCRAMBLE_CHARS.length)]
                : q.char
              queue[i].char = c
              out += `<span style="color:#FF2D55;opacity:0.8">${c}</span>`
            }
          }
          container.innerHTML = out
          frame++
          if (done < queue.length) requestAnimationFrame(update)
          else resolve()
        }
        requestAnimationFrame(update)
      })
    }

    /* ─── RESULT REVEAL ─── */
    function showResult(data) {
      document.getElementById('result-emoji').textContent     = data.emoji
      document.getElementById('result-decision').innerHTML    = ''
      document.getElementById('result-divider').style.display = 'none'
      document.getElementById('result-reason').style.display  = 'none'
      document.getElementById('result-psych').style.display   = 'none'
      document.getElementById('retry-btn').style.display      = 'none'
      document.getElementById('reason-text').textContent      = data.reason
      document.getElementById('psych-concept').textContent    = data.psychology_concept
      document.getElementById('psych-explain').textContent    = data.psychology_explain

      showScreen('result')

      setTimeout(async () => {
        await textScramble(document.getElementById('result-decision'), data.decision)
      }, 550)

      const show = (id, delay) => setTimeout(() => {
        const el = document.getElementById(id)
        el.style.display = 'block'
        void el.offsetWidth
      }, delay)

      show('result-divider', 2300)
      show('result-reason',  2800)
      show('result-psych',   3300)
      show('retry-btn',      3800)
    }

    /* ─── SUBMIT ─── */
    function handleSubmit() {
      const dilemma = textarea.value.trim()
      if (!dilemma) return

      showScreen('loading')
      startLoading()

      setTimeout(() => {
        const data = analyzeLocal(dilemma)
        stopLoading()
        showResult(data)
      }, 2400 + Math.random() * 800)
    }

    /* ─── INIT ─── */
    window.addEventListener('DOMContentLoaded', () => textarea.focus())
  </script>
</body>
</html>
